# MyHarness Model Catalog
# Single source of truth for all agent model assignments.
# To change a model: edit the alias value under `models:`, then run:
#   bash .harness/agents/sync-models.sh                   # sync Copilot agents (.github/agents/)
#   bash .harness/agents/sync-models.sh --provider claude  # sync Claude Code agents (.claude/agents/)
#
# Providers:
#   copilot     — GitHub Copilot agent API (.github/agents/*.agent.md)
#   claude — Claude Code CLI / SDK    (.claude/agents/*.md)
#
# Copilot model list: GPT-4.1, GPT-5 mini, GPT-5.2, GPT-5.2-Codex, GPT-5.3-Codex,
#                     GPT-5.4, GPT-5.4 mini, Claude Haiku 4.5, Claude Sonnet 4.5/4.6,
#                     Gemini 2.5 Pro, Gemini 3 Flash, Gemini 3.1 Pro, Gemini 3.5 Flash,
#                     MAI-Code-1-Flash, Raptor mini

# ---------------------------------------------------------------------------
# Provider: copilot (default)
# ---------------------------------------------------------------------------
models:
  claude_opus:   "claude-sonnet-4-6"         # orchestration (Opus not in Copilot catalog — use Sonnet)
  claude_sonnet: "claude-sonnet-4-6"         # review, balanced quality/cost
  claude_haiku:  "claude-haiku-4-5-20251001" # lightweight/fast tasks
  gpt_frontier:  "GPT-5.4"                   # long-context synthesis, spec writing
  gpt_codex:     "GPT-5.3-Codex"             # code-centric reasoning, implementation

# ---------------------------------------------------------------------------
# Provider: claude
# Maps each tier to the best native Anthropic model.
# ---------------------------------------------------------------------------
claude_code_models:
  claude_opus:   "claude-opus-4-8"           # orchestration — most capable
  claude_sonnet: "claude-sonnet-4-6"         # review, balanced quality/cost
  claude_haiku:  "claude-haiku-4-5-20251001" # lightweight/fast tasks
  gpt_frontier:  "claude-opus-4-8"           # synthesis → Opus (long-context)
  gpt_codex:     "claude-sonnet-4-6"         # coding → Sonnet (fast + capable)

tiers:
  synthesis:
    model: gpt_frontier
    use_for: [srs, bd, specify, tasks, srs.system]
    description: "Long-context document synthesis, formal spec writing"

  coding:
    model: gpt_codex
    use_for: [plan, dd, implement]
    description: "Code-centric reasoning, patch creation, build/test-fix loops"

  review:
    model: claude_sonnet
    use_for: [review.spec, review.code, init]
    description: "Gate pass/fail decisions, multi-artifact comparison"

  # lightweight: fast tasks that don't require frontier reasoning
  # Both providers map this tier to claude_haiku (Claude Haiku 4.5):
  #   Claude Code: ~5-8x faster than Sonnet, ~10x cheaper
  #   Copilot:     Claude Haiku 4.5 is in the Copilot catalog, fast + low-cost for Q&A / low-stakes review
  lightweight:
    model: claude_haiku
    use_for: [clarify, review.plan, compress]
    description: "Q&A resolution, low-stakes review gates, artifact summarization"

  orchestrator:
    model: claude_sonnet
    use_for: [orchestrator]
    description: "Top-level coordinator, full pipeline autonomy"

agents:
  myharness.orchestrator:  { model: claude_sonnet,   role: orchestrator }
  myharness.orchestrator-control: { model: claude_sonnet, role: orchestrator }
  myharness.bd:            { model: gpt_frontier,    role: synthesis }
  myharness.clarify:       { model: claude_haiku,    role: lightweight }  # was gpt_frontier — Q&A only, no frontier needed
  myharness.specify:       { model: gpt_frontier,    role: synthesis }
  myharness.srs:           { model: gpt_frontier,    role: synthesis }
  myharness.srs.system:    { model: gpt_frontier,    role: synthesis }
  myharness.tasks:         { model: gpt_frontier,    role: synthesis }
  myharness.plan:          { model: gpt_codex,       role: coding }
  myharness.dd:            { model: gpt_codex,       role: coding }
  myharness.implement:     { model: gpt_codex,       role: coding }
  myharness.review.code:   { model: claude_sonnet,   role: review }
  myharness.review.plan:   { model: claude_haiku,    role: lightweight }  # was claude_sonnet — 97/100 score shows over-spec'd
  myharness.review.spec:   { model: claude_sonnet,   role: review }
  myharness.init:          { model: claude_sonnet,   role: review }
  myharness.testkit:       { model: claude_sonnet,   role: review }
  myharness.analyze:       { model: claude_sonnet,   role: review }
  myharness.checklist:     { model: claude_sonnet,   role: review }
  myharness.constitution:  { model: gpt_frontier,    role: synthesis }
  myharness.taskstoissues: { model: claude_sonnet,   role: review }
  myharness.compress:      { model: claude_haiku,    role: lightweight }  # NEW — artifact summarization

escalation:
  synthesis_fail_after: 3   # retries before escalating to review tier
  coding_fail_after: 3

budget:
  max_cost_usd_per_run: 5.00
  warn_at_ratio: 0.70
  restrict_at_ratio: 0.85
  block_at_ratio: 0.95

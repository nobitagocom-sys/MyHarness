# Harness health check alert thresholds
# Adjust per project as the pipeline matures.

file_size:
  max_warnings: 3          # files exceeding size limit indicate spec drift

workflow:
  max_issues: 0            # workflow DAG must have zero structural issues
  max_orphan_steps: 1      # orphan steps indicate stale workflows

context:
  min_coverage: 0.70       # minimum avg context coverage across agent calls
  max_waste_percent: 30    # maximum % of context tokens not used by agent

behavior:
  max_violation_rate: 0.03 # max fraction of agent actions that violate role boundaries
  max_hallucinations_per_100: 1  # max hallucination events per 100 agent calls

evolution:
  max_override_rate: 0.15  # 15% human override is normal for small teams
